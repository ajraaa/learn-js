<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Cart Quantity</title>
</head>

<body>
    <h1>Cart Quantity</h1>
    <button onclick="console.log(cart);">Show Quantity</button>
    <button onclick="cart = cart + 1;">Add to cart</button>
    <button onclick="cart = cart + 2;">+2</button>
    <button onclick="cart = cart + 3;">+3</button>
    <button onclick="cart = 0;">Reset Cart</button>

    <script>
        let cart = 0;
    </script>
</body>

</html>
