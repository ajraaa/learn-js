<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Expenses</title>
</head>

<body>
    <form>
        <input type="text" placeholder="Expense Name" id="expense-name">
        <input type="number" placeholder="Amount" id="expense-amount">
        <button type="button" id="btn-submit">Submit</button>
    </form>

    <ul id="expense-list"></ul>

    <script>
        let expenses = [];
        const expenseList = document.getElementById("expense-list");
        const btnSubmit = document.getElementById("btn-submit");
        const expenseName = document.getElementById("expense-name");
        const expenseAmount = document.getElementById("expense-amount");

        function renderExpenses() {
            expenseList.innerHTML = '';
            expenses.forEach((expense) => {
                const li = document.createElement('li');
                const btnDelete = document.createElement('button');

                btnDelete.textContent = 'Delete';
                btnDelete.id = 'btn-delete';
                btnDelete.style.marginLeft = '5px';

                li.dataset.id = expense.id;
                li.textContent = `${expense.name} Rp.${expense.amount}`;

                li.appendChild(btnDelete);
                expenseList.appendChild(li);
            });
        }

        // submit btn clicked then push the text from input to the array
        btnSubmit.addEventListener('click', (e) => {
            if (!expenseName.value || !expenseAmount.value) return;

            const newExpense = {
                id: Date.now(),
                name: expenseName.value,
                amount: Number(expenseAmount.value)
            };
            expenses.push(newExpense);
            renderExpenses();

            expenseName.value = '';
            expenseAmount.value = '';
        });

        // get selected expense
        expenseList.addEventListener('click', (event) => {
            if (event.target.id.includes('btn-delete')) {
                const dataId = Number(event.target.closest('li').dataset.id);
                // delete selected expense from array
                expenses = expenses.filter(expense => expense.id !== dataId);
                //call renderExpense()
                renderExpenses();
            }
        });
    </script>
</body>

</html>
