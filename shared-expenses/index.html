<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Expenses</title>
</head>

<body>
    <input type="text" placeholder="Expense" id="expense-input">
    <button onclick="addExpense()">Submit</button>
    <ul id="expense-list"></ul>

    <script>
        let expenses = [];
        const expenseList = document.getElementById("expense-list");

        function renderExpenses() {
            expenseList.innerHTML = '';
            expenses.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                expenseList.appendChild(li);
            });
        }

        // submit btn clicked then push the text from input to the array
        function addExpense() {
            const inputedExpense = document.getElementById("expense-input").value;
            expenses.push(inputedExpense);
            renderExpenses();
        }
    </script>
</body>

</html>
