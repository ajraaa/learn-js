<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Expenses</title>
</head>

<body>
    <form>
        <input type="text" placeholder="Expense Name" id="expense-name">
        <input type="number" placeholder="Amount" id="expense-amount">
        <button type="button" onclick="addExpense()">Submit</button>
    </form>

    <ul id="expense-list"></ul>

    <script>
        let expenses = [];
        const expenseList = document.getElementById("expense-list");

        function renderExpenses() {
            expenseList.innerHTML = '';
            for (let i = 0; i < expenses.length; i++) {
                const li = document.createElement('li');
                const btnDelete = document.createElement('button');
                btnDelete.textContent = 'Delete';
                btnDelete.setAttribute('onclick', 'deleteExpense()');
                btnDelete.setAttribute('style', 'margin-left: 5px');
                li.dataset.id = i;
                li.textContent = `${expenses[i].name} Rp.${expenses[i].amount}`;
                expenseList.appendChild(li);
                li.appendChild(btnDelete);
            }
        }

        // submit btn clicked then push the text from input to the array
        function addExpense() {
            const expenseName = document.getElementById("expense-name").value;
            const expenseAmount = document.getElementById("expense-amount").value;

            const newExpense = {
                name: expenseName,
                amount: expenseAmount
            };
            expenses.push(newExpense);
            renderExpenses();
        }

        function deleteExpense() {
            console.log('true');
            // get selected expense
            expenseList.addEventListener('click', (event) => {
                if (event.target.tagName === 'BUTTON') {
                    const dataId = event.target.closest('li').dataset.id;
                    console.log(dataId);
                    // delete selected expense from array
                    expenses.splice(dataId, 1);
                    //call renderExpense()
                    renderExpenses();
                }
            });
        }
    </script>
</body>

</html>
